name: Update Features Nav and Fahad

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - name: Update navigation and Fahad profile
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          nav_links = '<ul class="nav-links"><li><a href="events.html">Events & Culture</a></li><li class="dropdown"><a href="people-impact.html">Features</a><div class="dropdown-menu"><a href="artist-feature.html">Featured Artists</a><a href="featured-voices.html">Featured Voices</a><a href="impact-profiles.html">Impact Profiles</a></div></li><li><a href="issue-01.html">Issue 01</a></li><li><a href="get-featured.html">Get Featured</a></li></ul>'
          mobile = '<div class="mobile-menu" id="mobileMenu"><a href="events.html">Events & Culture</a><a href="artist-feature.html">Featured Artists</a><a href="featured-voices.html">Featured Voices</a><a href="impact-profiles.html">Impact Profiles</a><a href="issue-01.html">Issue 01</a><a href="get-featured.html" onclick="toggleMenu()">Get Featured</a><a href="mailto:feature@cosmopolitanartmagazinepk.online">Submit Work</a></div>'
          dropdown_css = '.dropdown{position:relative}.dropdown-menu{display:none;position:absolute;top:100%;left:0;background:white;border:1px solid var(--border);min-width:220px;padding:.8rem 0;box-shadow:0 18px 45px rgba(0,0,0,.08);z-index:1005}.dropdown:hover .dropdown-menu{display:block}.dropdown-menu a{display:block;padding:.75rem 1rem;white-space:nowrap}.dropdown-menu a:hover{color:var(--pink)}'
          qna_css = '.qna-list{display:grid;gap:1.2rem}.qna-item{border:1px solid var(--border);background:#fff;padding:1.6rem}.qna-item h3{font-family:\'Playfair Display\',serif;font-size:1.25rem;line-height:1.35;margin-bottom:.8rem}.qna-item p{line-height:1.9;color:#555}'
          fahad_img = '728606248_1589747886000267_8949820413381359821_n.jpg'

          for path in Path('.').glob('*.html'):
              text = path.read_text(encoding='utf-8')
              text = re.sub(r'<ul class="nav-links">.*?</ul>', nav_links, text, flags=re.S)
              text = re.sub(r'<div class="mobile-menu" id="mobileMenu">.*?</div>', mobile, text, flags=re.S)
              text = text.replace('fahad-shahbaz-profile.jpg', fahad_img)
              if '</style>' in text and '.dropdown-menu' not in text:
                  text = text.replace('</style>', dropdown_css + '</style>')
              if path.name == 'fahad-shahbaz.html':
                  if '.qna-list' not in text and '</style>' in text:
                      text = text.replace('</style>', qna_css + '</style>')
                  qna = '''<section class="section"><h2 class="section-title">Cosmo <em>Q&A</em></h2><div class="qna-list"><div class="qna-item"><h3>What inspired Fahad Shahbaz to start Youth General Assembly?</h3><p>Youth General Assembly began when Fahad was eighteen, rooted in the belief that young Pakistanis deserve a real seat at the policy table and a serious platform for civic participation.</p></div><div class="qna-item"><h3>What does Youth General Assembly do today?</h3><p>YGA has grown into a 96-member assembly working around youth leadership, policy engagement, dialogue, and the way institutions connect with young people in Pakistan.</p></div><div class="qna-item"><h3>Who can be part of Youth General Assembly?</h3><p>The platform is built for young people interested in leadership, public service, civic engagement, social impact, and policy conversations. Those who want to contribute to youth representation can connect with YGA through its official platforms.</p></div><div class="qna-item"><h3>What does global recognition mean for youth leadership in Pakistan?</h3><p>Recognition such as Forbes 30 Under 30 Asia, as shared by the Youth General Assembly team, highlights how youth-led civic work from Pakistan can be seen globally and can inspire more young people to take their ideas seriously.</p></div></div></section>'''
                  if 'Cosmo <em>Q&A</em>' not in text:
                      text = text.replace('<section class="more-section">', qna + '<section class="more-section">')
              path.write_text(text, encoding='utf-8')

          # Use the uploaded portrait filename across the site. If the final named asset does not exist yet,
          # copy the current Fahad image so pages resolve correctly.
          if Path('fahad-shahbaz-profile.jpg').exists() and not Path(fahad_img).exists():
              Path(fahad_img).write_bytes(Path('fahad-shahbaz-profile.jpg').read_bytes())

          Path('features-nav-trigger.txt').unlink(missing_ok=True)
          Path('.github/workflows/update-features-nav-fahad.yml').unlink(missing_ok=True)
          PY
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Update features menu and Fahad profile' || exit 0
          git push origin HEAD:main
          git push origin HEAD:gh-pages --force
