name: Ensure AdSense meta once

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  ensure-meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Add Google AdSense account meta tag to all HTML files
        run: |
          python3 <<'PY'
          from pathlib import Path
          meta = '<meta name="google-adsense-account" content="ca-pub-4139752120547020">'
          for path in Path('.').glob('*.html'):
              text = path.read_text(encoding='utf-8')
              new = text
              if 'google-adsense-account' not in new:
                  if '<meta name="viewport" content="width=device-width, initial-scale=1.0">' in new:
                      new = new.replace('<meta name="viewport" content="width=device-width, initial-scale=1.0">', '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n' + meta, 1)
                  elif '<head>' in new:
                      new = new.replace('<head>', '<head>\n' + meta, 1)
              if new != text:
                  path.write_text(new, encoding='utf-8')
          Path('.github/workflows/ensure-adsense-meta-once.yml').unlink(missing_ok=True)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "All HTML pages already have AdSense meta tag."
          else
            git commit -m "Add Google AdSense account meta tag"
            git push
          fi
