name: Fix Sana Image Once

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-sana-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Download Sana portrait and clean duplicates
        run: |
          set -e
          python3 -m pip install --quiet pillow
          curl -L "https://sdmntpraustraliaeast.oaiusercontent.com/files/00000000-6708-71fa-aff2-3475c4ae00c5/raw?se=2026-07-06T09:20:09Z&sp=r&sv=2026-02-06&sr=b&scid=2a238132-d59f-5b02-9e67-94bd8201f2fd&skoid=b7fc319f-b93c-4fac-ba5f-14fdc3f9209f&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-07-06T01:07:32Z&ske=2026-07-08T01:07:32Z&sks=b&skv=2026-02-06&sig=4Hr/ihsPJTEdlIKIHIC/DSF/9I1ugVehU6YO2Cm/DSk%3D" -o sana-dar-original.jpg
          python3 <<'PY'
          from PIL import Image
          from pathlib import Path
          im = Image.open('sana-dar-original.jpg').convert('RGB')
          im.thumbnail((1200, 1500))
          im.save('sana-dar-portrait.jpg', quality=86, optimize=True, progressive=True)
          Path('sana-dar-original.jpg').unlink(missing_ok=True)
          PY
          python3 <<'PY'
          from pathlib import Path
          for path in Path('.').glob('*.html'):
              txt = path.read_text(encoding='utf-8')
              txt = txt.replace('Sana_Dar_Portrait.jpg', 'sana-dar-portrait.jpg')
              path.write_text(txt, encoding='utf-8')
          for duplicate in ['Sana_Dar_Portrait.jpg','sana-image-check.html']:
              Path(duplicate).unlink(missing_ok=True)
          Path('.pages-deploy-trigger').write_text('trigger pages deploy after Sana image fix\n', encoding='utf-8')
          Path('.github/workflows/fix-sana-image-once.yml').unlink(missing_ok=True)
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Sana Dar portrait image and remove duplicate files" || exit 0
          git push origin HEAD:main
          git push origin HEAD:gh-pages --force
