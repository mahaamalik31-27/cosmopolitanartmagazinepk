name: Use Sana JPGJPG Once

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sana-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - name: Use sana-dar-portrait jpgjpg path
        run: |
          python3 <<'PY'
          from pathlib import Path
          final = 'sana-dar-portrait.jpg.jpg'
          for path in Path('.').glob('*.html'):
              text = path.read_text(encoding='utf-8')
              text = text.replace('Sana_Dar_Portrait.jpg', final)
              text = text.replace('sana-dar-portrait.jpg.jpg.jpg', final)
              text = text.replace('sana-dar-portrait.jpg', final)
              path.write_text(text, encoding='utf-8')
          Path('sana-jpgjpg-trigger.txt').unlink(missing_ok=True)
          Path('.github/workflows/use-sana-jpgjpg-once.yml').unlink(missing_ok=True)
          PY
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Use Sana jpgjpg portrait path' || exit 0
          git push origin HEAD:main
          git push origin HEAD:gh-pages --force
