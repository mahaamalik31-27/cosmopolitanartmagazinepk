name: Update Get Featured menu once

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-menu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Replace Follow menu with Get Featured
        run: |
          python3 <<'PY'
          from pathlib import Path
          replacements = {
              '<li><a href="index.html#follow">Follow</a></li>': '<li><a href="get-featured.html">Get Featured</a></li>',
              '<li><a href="#follow">Follow</a></li>': '<li><a href="get-featured.html">Get Featured</a></li>',
              '<a href="#follow" onclick="toggleMenu()">Follow</a>': '<a href="get-featured.html" onclick="toggleMenu()">Get Featured</a>',
              '<a href="index.html#follow">Follow</a>': '<a href="get-featured.html">Get Featured</a>',
              '<a href="#follow">Follow</a>': '<a href="get-featured.html">Get Featured</a>',
          }
          for path in Path('.').glob('*.html'):
              text = path.read_text(encoding='utf-8')
              new = text
              for old, repl in replacements.items():
                  new = new.replace(old, repl)
              if new != text:
                  path.write_text(new, encoding='utf-8')
          Path('.github/workflows/update-get-featured-menu-once.yml').unlink(missing_ok=True)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No menu changes needed."
          else
            git commit -m "Add Get Featured to site menu"
            git push
          fi
