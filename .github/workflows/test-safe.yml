name: Upload Sana Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-sana-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download Sana portrait
        run: curl -L https://images.squarespace-cdn.com/content/v1/5c668d98523958033699cbf3/67cabb72-cdf8-4497-aeee-b668a4e89ae7/IMG_2465%2B2.jpg -o sana-dar-portrait.jpg
      - name: Commit image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sana-dar-portrait.jpg
          git commit -m "Upload high resolution Sana portrait" || exit 0
          git push
