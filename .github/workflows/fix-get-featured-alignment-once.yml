name: Fix Get Featured alignment once

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-alignment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Center How It Works cards
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('get-featured.html')
          text = path.read_text(encoding='utf-8')
          new = text
          if '.process-grid' not in new:
              new = new.replace(
                  ".card h3{font-family:'Playfair Display',serif;font-size:2rem;line-height:1;margin:1rem 0;}",
                  ".card h3{font-family:'Playfair Display',serif;font-size:2rem;line-height:1;margin:1rem 0;}.process-grid{max-width:980px;margin:3rem auto 0;display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;justify-content:center;}.process-grid .card{min-height:250px;}"
              )
          new = new.replace(
              '<section class="section center"><div class="inner"><p class="label">How It Works</p><h2 class="section-title">From Submission to <em>Feature</em></h2><div class="cards">',
              '<section class="section center"><div class="inner"><p class="label">How It Works</p><h2 class="section-title">From Submission to <em>Feature</em></h2><div class="process-grid">'
          )
          new = new.replace(
              '@media(max-width:1000px){.cards{grid-template-columns:repeat(2,1fr);}.requirements{grid-template-columns:1fr;}}',
              '@media(max-width:1000px){.cards{grid-template-columns:repeat(2,1fr);}.process-grid{grid-template-columns:1fr;max-width:520px;}.requirements{grid-template-columns:1fr;}}'
          )
          if new != text:
              path.write_text(new, encoding='utf-8')
          Path('.github/workflows/fix-get-featured-alignment-once.yml').unlink(missing_ok=True)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No alignment changes needed."
          else
            git commit -m "Fix Get Featured process card alignment"
            git push
          fi
