name: Final Sana Image Fix

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-sana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - name: Fix Sana portrait image and paths
        run: |
          set -e
          curl -L 'https://images.squarespace-cdn.com/content/v1/5c668d98523958033699cbf3/67cabb72-cdf8-4497-aeee-b668a4e89ae7/IMG_2465%2B2.jpg?format=1500w' -o Sana_Dar_Portrait.jpg
          cp Sana_Dar_Portrait.jpg sana-dar-portrait.jpg
          python3 <<'PY'
          from pathlib import Path
          final = 'Sana_Dar_Portrait.jpg'
          for path in Path('.').glob('*.html'):
              text = path.read_text(encoding='utf-8')
              text = text.replace('sana-dar-portrait.jpg.jpg', final)
              text = text.replace('sana-dar-portrait.jpg', final)
              text = text.replace('Sana_Dar_Portrait.jpg.jpg', final)
              path.write_text(text, encoding='utf-8')
          Path('.sana-final-trigger').unlink(missing_ok=True)
          Path('.github/workflows/final-sana-image-fix.yml').unlink(missing_ok=True)
          PY
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Final fix Sana portrait image' || exit 0
          git push origin HEAD:main
          git push origin HEAD:gh-pages --force
